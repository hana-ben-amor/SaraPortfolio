<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.bg-gray-950]="isScrolled()"
  [class.shadow-lg]="isScrolled()"
  [class.bg-transparent]="!isScrolled()"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <button
        (click)="scrollTo('home')"
        class="text-xl font-bold bg-gradient-to-r from-purple-400 to-violet-400 bg-clip-text text-transparent hover:from-purple-300 hover:to-violet-300 transition-all duration-300"
      >
        Hana Ben Amor
      </button>

      <!-- Desktop Nav Links -->
      <div class="hidden md:flex items-center gap-6">
        @for (item of navItems(); track item.id) {
          <button
            (click)="scrollTo(item.id)"
            class="text-gray-300 hover:text-purple-400 transition-colors duration-200 text-sm font-medium relative group"
          >
            {{ item.label }}
            <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-purple-400 transition-all duration-300 group-hover:w-full"></span>
          </button>
        }

        <!-- Language Toggle -->
        <button
          (click)="toggleLanguage()"
          class="ml-2 px-3 py-1 rounded-full border border-purple-500 text-purple-400 text-xs font-semibold hover:bg-purple-500 hover:text-white transition-all duration-200"
        >
          {{ currentLang() === 'en' ? 'FR' : 'EN' }}
        </button>

        <!-- Dark/Light Toggle -->
        <button
          (click)="toggleTheme()"
          class="ml-1 w-9 h-9 flex items-center justify-center rounded-full border border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white transition-all duration-200"
          [title]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (themeService.isDark()) {
            <!-- Sun icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          } @else {
            <!-- Moon icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          }
        </button>
      </div>

      <!-- Mobile: theme + lang + hamburger -->
      <div class="flex md:hidden items-center gap-2">
        <!-- Dark/Light Toggle Mobile -->
        <button
          (click)="toggleTheme()"
          class="w-8 h-8 flex items-center justify-center rounded-full border border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white transition-all duration-200"
        >
          @if (themeService.isDark()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          }
        </button>
        <button
          (click)="toggleLanguage()"
          class="px-3 py-1 rounded-full border border-purple-500 text-purple-400 text-xs font-semibold hover:bg-purple-500 hover:text-white transition-all duration-200"
        >
          {{ currentLang() === 'en' ? 'FR' : 'EN' }}
        </button>
        <button
          (click)="toggleMenu()"
          class="text-gray-300 hover:text-purple-400 transition-colors duration-200 p-1"
          aria-label="Toggle menu"
        >
          @if (!isMenuOpen()) {
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          } @else {
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          }
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen()) {
    <div class="md:hidden bg-gray-950/95 backdrop-blur-sm border-t border-purple-900/30">
      <div class="px-4 py-4 flex flex-col gap-1">
        @for (item of navItems(); track item.id) {
          <button
            (click)="scrollTo(item.id)"
            class="text-gray-300 hover:text-purple-400 transition-colors duration-200 text-sm font-medium text-left py-2 border-b border-gray-800 last:border-b-0"
          >
            {{ item.label }}
          </button>
        }
      </div>
    </div>
  }
</nav>
