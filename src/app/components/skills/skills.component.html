<section id="skills" class="py-24 bg-gray-950">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    @if (t(); as t) {
      <!-- Section Header -->
      <div class="text-center mb-16">
        <h2 class="text-4xl font-bold text-white mb-3">{{ t.skills.sectionTitle }}</h2>
        <p class="text-pink-400 text-lg">{{ t.skills.sectionSubtitle }}</p>
        <div class="mt-4 mx-auto w-16 h-1 bg-gradient-to-r from-pink-500 to-pink-500 rounded-full"></div>
      </div>

      <!-- Skill Groups Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        @for (group of skillGroups; track group.key) {
          <div
            class="bg-gradient-to-br border rounded-2xl p-6 hover:scale-[1.02] transition-transform duration-300"
            [class]="group.color"
          >
            <div class="flex items-center gap-3 mb-5">
              <span class="text-2xl">{{ group.icon }}</span>
              <h3 class="text-white font-bold text-lg">{{ t.skills[group.key] }}</h3>
            </div>
            <div class="flex flex-wrap gap-2">
              @for (skill of group.items; track skill) {
                <span class="skill-badge px-3.5 py-1.5 bg-gray-900/80 text-gray-200 text-sm font-medium rounded-full border border-gray-700 hover:border-pink-500/60 hover:text-pink-300 hover:bg-gray-900 transition-all duration-200 cursor-default">
                  {{ skill }}
                </span>
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</section>
